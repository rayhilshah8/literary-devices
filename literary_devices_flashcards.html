<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literary Devices Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --card-front: #faf7f2;
    --card-back: #1e1a2e;
    --accent: #c0392b;
    --accent2: #8e44ad;
    --gold: #c9a84c;
    --got-it: #27ae60;
    --learning: #e67e22;
    --muted: #7a6f63;
    --border: #d4c9b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(192,57,43,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 100%, rgba(142,68,173,0.07) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  header h1 span {
    color: var(--accent);
    font-style: italic;
  }

  header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Stats bar */
  .stats {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--muted);
    flex-wrap: wrap;
    justify-content: center;
  }
  .stats span { display: flex; align-items: center; gap: 5px; }
  .stats .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .dot-remaining { background: var(--ink); }
  .dot-got { background: var(--got-it); }
  .dot-learning { background: var(--learning); }

  /* Progress bar */
  .progress-wrap {
    width: 100%;
    max-width: 580px;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.5s ease;
  }

  /* Card area */
  .card-area {
    perspective: 1200px;
    width: 100%;
    max-width: 580px;
    height: 340px;
    margin-bottom: 20px;
    cursor: pointer;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
  }

  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
  }

  .card-front {
    background: var(--card-front);
    border: 1.5px solid var(--border);
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 16px 16px 0 0;
  }

  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    color: #f0ecfa;
  }

  .card-number {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 500;
  }
  .card-back .card-number { color: rgba(240,236,250,0.4); }

  .term {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.15;
  }

  .flip-hint {
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .flip-hint svg { opacity: 0.5; }

  /* Back content */
  .def-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .main-def {
    font-size: clamp(0.88rem, 2.2vw, 1rem);
    line-height: 1.6;
    color: #f0ecfa;
    margin-bottom: 14px;
  }
  .extra-def {
    font-size: 0.78rem;
    color: rgba(240,236,250,0.55);
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 10px;
    margin-bottom: 0;
    font-style: italic;
  }
  .tip-block {
    margin-top: 10px;
    font-size: 0.76rem;
    color: rgba(201,168,76,0.9);
    background: rgba(201,168,76,0.08);
    border-left: 2px solid var(--gold);
    padding: 7px 10px;
    border-radius: 0 6px 6px 0;
    text-align: left;
    line-height: 1.45;
  }
  .tip-block strong { display: block; font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 2px; opacity: 0.7; }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 580px;
  }

  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    cursor: pointer;
    transition: all 0.18s ease;
    letter-spacing: 0.02em;
    display: flex; align-items: center; gap: 6px;
  }
  .btn:active { transform: scale(0.97); }

  .btn-got {
    background: var(--got-it);
    color: #fff;
    flex: 1;
  }
  .btn-got:hover { background: #219a52; }

  .btn-learning {
    background: var(--learning);
    color: #fff;
    flex: 1;
  }
  .btn-learning:hover { background: #ca6f1e; }

  .btn-skip {
    background: var(--border);
    color: var(--muted);
    flex: 0 0 auto;
  }
  .btn-skip:hover { background: #c0b5a4; color: var(--ink); }

  .btn-secondary {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    font-size: 0.78rem;
  }
  .btn-secondary:hover { border-color: var(--ink); color: var(--ink); }

  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    width: 100%;
    max-width: 580px;
    margin-bottom: 28px;
  }

  /* Filter tabs */
  .filter-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 20px;
    background: rgba(0,0,0,0.05);
    border-radius: 10px;
    padding: 4px;
  }
  .tab {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 500;
    padding: 6px 14px;
    border: none;
    border-radius: 7px;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.18s;
  }
  .tab.active {
    background: #fff;
    color: var(--ink);
    box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }

  /* Done screen */
  .done-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    max-width: 480px;
  }
  .done-screen.visible { display: flex; }
  .done-emoji { font-size: 3rem; margin-bottom: 12px; }
  .done-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .done-screen p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 24px; }
  .done-stats {
    display: flex; gap: 24px; margin-bottom: 28px;
    flex-wrap: wrap; justify-content: center;
  }
  .done-stat { text-align: center; }
  .done-stat .n {
    font-family: 'Playfair Display', serif;
    font-size: 2rem; font-weight: 700;
  }
  .done-stat .l { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .done-stat.green .n { color: var(--got-it); }
  .done-stat.orange .n { color: var(--learning); }

  .main-view { width: 100%; display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<header>
  <h1>Literary <span>Devices</span></h1>
  <p>52 Terms · Tap card to flip</p>
</header>

<div class="main-view" id="mainView">
  <div class="filter-tabs">
    <button class="tab active" onclick="setFilter('all')">All (52)</button>
    <button class="tab" id="tab-learning" onclick="setFilter('learning')">Still Learning</button>
    <button class="tab" id="tab-got" onclick="setFilter('got')">Got It</button>
  </div>

  <div class="stats">
    <span><i class="dot dot-remaining"></i> <span id="statRemaining">52</span> remaining</span>
    <span><i class="dot dot-got"></i> <span id="statGot">0</span> got it</span>
    <span><i class="dot dot-learning"></i> <span id="statLearning">0</span> still learning</span>
  </div>

  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="card-area" onclick="flipCard()" id="cardArea">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front" id="cardFront">
        <div class="card-number" id="cardNum">1 / 52</div>
        <div class="term" id="cardTerm">—</div>
        <div class="flip-hint">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
          tap to reveal
        </div>
      </div>
      <div class="card-face card-back" id="cardBack">
        <div class="card-number" id="cardNumBack">1 / 52</div>
        <div class="def-label">Definition</div>
        <div class="main-def" id="cardMainDef">—</div>
        <div class="extra-def" id="cardExtraDef"></div>
        <div class="tip-block" id="cardTip" style="display:none">
          <strong>💡 Memory Tip</strong>
          <span id="cardTipText"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-learning" onclick="markCard('learning')">😅 Still Learning</button>
    <button class="btn btn-got" onclick="markCard('got')">✓ Got It</button>
    <button class="btn btn-skip" onclick="nextCard()">Skip →</button>
  </div>

  <div class="controls">
    <button class="btn btn-secondary" onclick="shuffleDeck()">🔀 Shuffle</button>
    <button class="btn btn-secondary" onclick="resetAll()">↺ Reset All</button>
    <button class="btn btn-secondary" onclick="reviewLearning()">📚 Review Still Learning</button>
  </div>
</div>

<div class="done-screen" id="doneScreen">
  <div class="done-emoji">🎉</div>
  <h2>Deck Complete!</h2>
  <p>You've gone through all the cards in this set. Here's how you did:</p>
  <div class="done-stats">
    <div class="done-stat green">
      <div class="n" id="doneGot">0</div>
      <div class="l">Got It</div>
    </div>
    <div class="done-stat orange">
      <div class="n" id="doneLearning">0</div>
      <div class="l">Still Learning</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-learning" style="font-size:0.85rem" onclick="reviewLearning()">📚 Review Still Learning</button>
    <button class="btn btn-got" style="font-size:0.85rem;background:var(--accent2)" onclick="resetAll()">↺ Start Over</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  {
    term: "Allegory",
    mainDef: "when a story has a hidden moral or political meaning",
    extraDef: "A narrative where characters, events, and settings represent abstract ideas or moral qualities — the whole story functions as an extended metaphor.",
    tip: "Think Animal Farm: the farm = the story, but the real subject is political corruption. Every element stands for something else."
  },
  {
    term: "Alliteration",
    mainDef: "when same sounds are repeated in closely connected words",
    extraDef: "Specifically the repetition of the same initial consonant sound in nearby words (e.g., 'Peter Piper picked...').",
    tip: "All the As at the Alliteration: the SAME STARTING SOUND repeated. Think tongue twisters."
  },
  {
    term: "Allusion",
    mainDef: "when the writer references something outside their work to draw on our prior knowledge and associations",
    extraDef: "An indirect reference to a person, place, event, or other literary work — the author doesn't explain it, they trust you to recognise it.",
    tip: "Allusion = allude = hint. The writer alludes to (hints at) something you already know."
  },
  {
    term: "Amplification",
    mainDef: "when a writer embellishes a statement with further information to give multiple meanings and bring our attention to a certain concept or idea or fact",
    extraDef: "Taking a simple word or phrase and expanding on it with additional details to deepen its impact or layers of meaning.",
    tip: "Amp it up. Like turning up the volume — you take one idea and keep adding to it to make it louder and richer."
  },
  {
    term: "Anachronism",
    mainDef: "when an author, deliberately or accidentally, puts historical events, fashions, technology, etc., in the wrong time period",
    extraDef: "From Greek: 'ana' (against) + 'chronos' (time). A clock in a Shakespeare play, or a character using a smartphone in the 1800s.",
    tip: "Anachronism = AGAINST TIME. 'Ana-' means against, 'chron' means time (like chronology)."
  },
  {
    term: "Anagram",
    mainDef: "when letters from words are rearranged to create other words",
    extraDef: "Every letter of the original word is used exactly once in the new word. E.g., 'listen' → 'silent'; 'Voldemort' → 'Tom Marvolo Riddle'.",
    tip: "ANAGRAM is itself an anagram of NAGA RAM — well, almost. Think of it as a letter scramble."
  },
  {
    term: "Analogy",
    mainDef: "when closely related things that may share the same pattern or relationship are compared and contrasted",
    extraDef: "An analogy explains something unfamiliar by comparing its relationship to something familiar (e.g., 'A sword is to a knight as a wand is to a wizard').",
    tip: "Analogy = relational comparison. It's not just 'these are similar' — it's 'these share the same RELATIONSHIP.' SAT-style: A:B :: C:D."
  },
  {
    term: "Anaphora",
    mainDef: "repetition of words or phrases at the beginnings of clauses or sentences",
    extraDef: "Creates rhythm and emphasis. Famous example: MLK's 'I have a dream... I have a dream... I have a dream...'",
    tip: "AN-aphora = AT THE FRONT. Think of 'ana' as 'again at the start.' Anaphora starts at the top."
  },
  {
    term: "Anastrophe",
    mainDef: "inverted word order",
    extraDef: "Reversing the normal order of words for rhetorical effect. Yoda speaks in anastrophe: 'Strong with the Force, you are.'",
    tip: "Anastrophe = Yoda-speak. Normal: 'You are strong.' Anastrophe: 'Strong, you are.' Twisted around!"
  },
  {
    term: "Anthropomorphism",
    mainDef: "storytelling where human characteristics are given to a non-human character, like in 'The Metamorphosis'",
    extraDef: "More literal than personification — the non-human character actually IS human-like in the world of the story (talking animals, etc.). Personification is a figure of speech; anthropomorphism is a narrative device.",
    tip: "Anthropo = human (anthropology), morph = form. Anthropomorphism literally means 'human form.' Mickey Mouse walks, talks, wears clothes — he's anthropomorphic."
  },
  {
    term: "Antithesis",
    mainDef: "a person or thing is the direct opposite",
    extraDef: "More precisely: the juxtaposition of contrasting ideas in balanced, parallel structure. 'It was the best of times, it was the worst of times.' The opposition is built into the sentence's architecture.",
    tip: "Anti = against. Antithesis places two OPPOSITES directly against each other in a balanced structure."
  },
  {
    term: "Aphorism",
    mainDef: "short, memorable sayings that teach a basic truth",
    extraDef: "A concise statement of a principle or truth, often witty. E.g., 'The early bird catches the worm.' Different from a proverb mainly in that aphorisms are often attributed to a specific person.",
    tip: "Think: a fortune cookie that's actually wise. Short. True. Memorable."
  },
  {
    term: "Apostrophe",
    mainDef: "addressing someone or something that isn't there",
    extraDef: "A rhetorical device where the speaker directly addresses an absent person, a dead person, or a non-human entity as if they could respond (e.g., 'O Death, where is thy sting?').",
    tip: "Not the punctuation mark! In literature, apostrophe = talking to something that can't talk back. 'O Romeo, Romeo, wherefore art thou Romeo?' — Juliet addresses someone not there."
  },
  {
    term: "Archetype",
    mainDef: "when a character is created based on a set of qualities and they represent the ideal",
    extraDef: "A universally recognisable character type, symbol, or situation that recurs across cultures and literature (e.g., the Hero, the Mentor, the Trickster, the Shadow).",
    tip: "Arche = original, type = pattern. Archetypes are the ORIGINAL templates — every hero is built on the same mould."
  },
  {
    term: "Cacophony",
    mainDef: "a combination of harsh, discordant sounds",
    extraDef: "The deliberate use of jarring, unpleasant sounds in writing — hard consonants (k, g, b, d) — to create a sense of chaos or unease.",
    tip: "Caco = bad (like 'cactus' scraping you), phony = sound. Bad sound. The opposite of euphony. Think: a cat knocking everything off a shelf."
  },
  {
    term: "Chiasmus",
    mainDef: "when phrases or clauses are balanced against one another by being reversed",
    extraDef: "An A-B-B-A structure. 'Ask not what your country can do for you — ask what you can do for your country.' The second clause reverses the first.",
    tip: "Chiasmus is named after the Greek letter Chi (X) — because the structure CROSSES over, like an X. A→B then B→A."
  },
  {
    term: "Circumlocution",
    mainDef: "it is when a writer expresses things indirectly in an ambiguous or paradoxical way and doesn't want to say things directly",
    extraDef: "Literally 'talking around' something — using many words where fewer would do, often to avoid saying something plainly. 'The person who delivers your mail' instead of 'mailman.'",
    tip: "Circum = around (like circumference), locution = speaking. Circumlocution = talking AROUND the point. Going in circles instead of just saying it."
  },
  {
    term: "Colloquialism",
    mainDef: "a word or expression that is commonplace within a language or geographic area or time period to provide personality or authenticity",
    extraDef: "Informal, everyday language — slang, regional phrases, casual speech. 'Gonna,' 'y'all,' 'wicked good.' Writers use it to make characters feel real and grounded.",
    tip: "Colloquial = casual conversation. Think of how you actually talk with friends vs. how you write an essay. That gap = colloquialism."
  },
  {
    term: "Connotation",
    mainDef: "the associative meanings or feelings that go with a word",
    extraDef: "The emotional or cultural baggage a word carries beyond its dictionary definition. 'Home' and 'house' have the same denotation but very different connotations.",
    tip: "Con = with, notation = note. Connotation = what comes WITH the word. The feelings and associations attached to it."
  },
  {
    term: "Denotation",
    mainDef: "the literal or dictionary definition",
    extraDef: "The objective, dictionary meaning of a word — stripped of any emotional association. 'Snake' denotes a legless reptile.",
    tip: "De-notation = the basic NOTE/meaning. Denotation is the dictionary definition — plain and simple."
  },
  {
    term: "Diction",
    mainDef: "word choice",
    extraDef: "The specific vocabulary a writer selects, and how those choices shape tone, character, and meaning. Formal vs. informal, simple vs. elaborate, abstract vs. concrete.",
    tip: "Diction sounds like 'dictionary.' It's literally about which words you choose from the dictionary."
  },
  {
    term: "Double Entendre",
    mainDef: "when a word or phrase has two meanings (one usually a bit naughty)",
    extraDef: "French for 'double meaning.' One interpretation is straightforward; the other is risqué or suggestive. Shakespeare was famously full of them.",
    tip: "Double = two, entendre = meaning (French). Two meanings for the price of one — and one of them usually makes someone blush."
  },
  {
    term: "Dramatic Irony",
    mainDef: "when the audience knows something that one or more characters do not know",
    extraDef: "Creates tension, suspense, or dark comedy. In Romeo and Juliet, we know Juliet isn't dead — Romeo doesn't. The tragedy unfolds from that gap in knowledge.",
    tip: "You're watching a horror movie and screaming 'DON'T GO IN THERE!' — that gap between what you know and what the character knows = dramatic irony."
  },
  {
    term: "Epistrophe",
    mainDef: "repetition of words or phrases at the endings of clauses or sentences",
    extraDef: "The mirror image of anaphora. 'Government of the people, by the people, for the people.' The repeated word comes at the END.",
    tip: "Epi = upon/at, strophe = turning. Think: the repetition lands at the END, like a period hitting hard. Opposite of anaphora."
  },
  {
    term: "Equivocation",
    mainDef: "Commonly known as 'doublespeak,' this is the use of vague or ambiguous language to hide one's meaning or to avoid committing to a point of view",
    extraDef: "Using deliberately unclear or misleading language, often to dodge accountability. Politicians are famous for it: 'I did not have financial relations with that company... directly.'",
    tip: "Equi = equal, voc = voice. Two equal voices — saying something that could mean two different things so you can't be pinned down."
  },
  {
    term: "Euphemism",
    mainDef: "when harsh or unpleasant words are reframed in a polite way",
    extraDef: "Substituting a mild or vague expression for a blunt one. 'Passed away' for 'died.' 'Downsizing' for 'firing people.' Makes uncomfortable truths more socially acceptable.",
    tip: "Eu = good/pleasant (like 'euphoria'), pheme = speech. Euphemism = pleasant speech. Softening something ugly with prettier words."
  },
  {
    term: "Euphony",
    mainDef: "this means 'sweet voiced' and refers to sounds that are pleasing to the ear",
    extraDef: "The use of soft, melodious sounds — flowing vowels, gentle consonants (l, m, n, r) — to create a harmonious, musical quality in writing.",
    tip: "Eu = good/pleasant, phony = sound. Good sound. The opposite of cacophony. Think of 'luminous,' 'melody,' 'willow' — smooth, flowing words."
  },
  {
    term: "Exposition",
    mainDef: "the description of background information that may cover character development, relationships, history or other relevant moments",
    extraDef: "The opening section of a narrative that sets the scene — who, what, where, when. It's the 'setup' before the action begins.",
    tip: "Expose = to reveal. Exposition EXPOSES the background information we need to understand the story."
  },
  {
    term: "Flashback",
    mainDef: "when the narrator takes us to an earlier time in the story",
    extraDef: "A scene set earlier in time than the main narrative — used to reveal backstory, explain motivation, or create dramatic irony. Also called 'analepsis.'",
    tip: "Exactly what it sounds like: a flash BACK in time. The story rewinds."
  },
  {
    term: "Foreshadowing",
    mainDef: "a hint of what is to come in the story",
    extraDef: "Clues or hints planted earlier in the narrative that anticipate later events. Creates suspense and makes the story feel inevitable in retrospect.",
    tip: "Fore = before (like 'forehead'). Foreshadowing casts a SHADOW of what's coming BEFORE it arrives."
  },
  {
    term: "Frame Story",
    mainDef: "a story set within another story",
    extraDef: "An outer narrative that contains or introduces one or more inner stories. E.g., The Canterbury Tales (pilgrims telling stories), or Frankenstein (letters containing a story containing a creature's story).",
    tip: "Like a picture frame around a painting — the frame story surrounds the inner story. One story holds another."
  },
  {
    term: "Hyperbole",
    mainDef: "over exaggeration for effect",
    extraDef: "Extreme exaggeration used for emphasis or humour — not meant to be taken literally. 'I've told you a million times.' 'I'm so hungry I could eat a horse.'",
    tip: "Hyper = over/excessive (hyperactive, hyperspeed). Hyperbole = excessive statement. Way, WAY over the top."

  {
    term: "Imagery",
    mainDef: "painting pictures in the readers' minds with words",

    tip: "IMAGE is right inside the word. Imagery creates images in your mind."

  {
    term: "Irony",

    extraDef: "A broad term covering situations where appearance and reality differ. Verbal irony = saying one thing meaning another. Situational irony = when what happens is the opposite of what was expected.",
    tip: "The most ironic thing about irony: what's said ≠ what's meant. A fire station burning down = situational irony. Saying 'Oh great, more rain' = verbal irony."
  },
  {
    term: "Juxtaposition",
    mainDef: "a comparison by contrast, it involves highlighting the differences between two things by placing them side by side",
    extraDef: "Placing two contrasting elements next to each other to highlight their differences. Unlike antithesis, juxtaposition doesn't require a balanced grammatical structure.",
    tip: "Juxta = near/beside (like 'adjacent'). Juxtaposition = placed BESIDE each other to show contrast. Rich next to poor. Light next to dark."
  },
  {
    term: "Litotes",
    mainDef: "ironic understatement in which an affirmative is expressed through a negative of its contrary ('That wasn't too bad!')",
    extraDef: "A specific type of understatement using a negative to express a positive. 'Not bad' = good. 'Not the smartest person in the room' = pretty dumb.",
    tip: "Litotes is the opposite of hyperbole. Instead of over-exaggerating, you UNDER-state using a double negative. 'Not bad' is a sneaky way of saying 'good.'"
  },
  {
    term: "Metaphor",
    mainDef: "a figure of speech with an implicit, implied, or hidden meaning",
    extraDef: "More precisely: a direct comparison between two unlike things WITHOUT 'like' or 'as.' 'Life is a journey.' 'The world is a stage.' The comparison is stated as fact.",
    tip: "Meta = beyond. A metaphor goes BEYOND literal meaning. No 'like' or 'as' — it just declares one thing IS another. 'You are my sunshine' — not literally true, but powerfully felt."

  {

    mainDef: "the way a reader feels after reading a writer's words",
    extraDef: "The emotional atmosphere of a text — the feeling it evokes in the reader (eerie, joyful, melancholic, tense). Created through diction, imagery, setting, and tone.",
    tip: "Mood = how YOU (the reader) feel. Tone = how the AUTHOR feels. The author's tone creates the reader's mood."
  },
  {
    term: "Motif",
    mainDef: "an object or idea that repeats throughout a work that may have symbolic significance and contribute toward the main theme",
    extraDef: "A recurring element — image, phrase, situation — that develops or reinforces the work's themes. E.g., the green light in The Great Gatsby (motif = hope/the American Dream).",
    tip: "Motif rhymes with 'repeat-if.' It REPEATS throughout the work, building meaning each time it appears."

  {

    extraDef: "Words whose pronunciation mimics the sound they describe. Buzz, hiss, clang, sizzle, murmur, whoosh. Makes writing more sensory and immediate.",
    tip: "Say it out loud: on-o-mat-o-POE-ia. The word itself is almost fun-sounding! The word sounds like what it means — words that sound like their meaning."
  },
  {
    term: "Oxymoron",
    mainDef: "when contradictory terms bring out a fresh meaning like 'organized chaos'",
    extraDef: "Two contradictory words placed together to create a new, paradoxical meaning. 'Bittersweet,' 'deafening silence,' 'cruel kindness.' Unlike paradox, it's compressed into a short phrase.",

    mainDef: "when contradictory concepts reveal a hidden truth",

    tip: "Paradox vs. Oxymoron: oxymoron is two words ('bittersweet'), paradox is a full idea ('the more you know, the more you realise you don't know'). Both are contradictory — paradox goes deeper."

  {

  {

    tip: "Simile sounds like 'similar.' It shows SIMILARITY using 'like' or 'as.' Simile = similar. Metaphor skips the 'like/as' entirely."

    extraDef: "The feeling or attitude the author conveys through their word choice and style — serious, playful, sarcastic, reverent, bitter. Tone shapes how we read everything else.",
    tip: "Tone = author's attitude. Mood = reader's feeling. Think of it like this: the author's TONE of voice determines the MOOD of the room."
  }
];

// State
let deck = [...ALL_CARDS];
let currentIndex = 0;
let isFlipped = false;
let gotIt = new Set();
let stillLearning = new Set();
let filter = 'all';
let activeDeck = [];

function buildActiveDeck() {
  if (filter === 'all') {
    activeDeck = deck.filter(c => !gotIt.has(c.term));
  } else if (filter === 'learning') {
    activeDeck = deck.filter(c => stillLearning.has(c.term));
  } else if (filter === 'got') {
    activeDeck = deck.filter(c => gotIt.has(c.term));
  }
  currentIndex = 0;
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  buildActiveDeck();
  isFlipped = false;
  renderCard();
  updateStats();
}

function renderCard() {
  const inner = document.getElementById('cardInner');
  inner.classList.remove('flipped');
  isFlipped = false;

  if (activeDeck.length === 0) {
    showDone();
    return;
  }

  hideDone();

  const card = activeDeck[currentIndex];
  const pos = currentIndex + 1;
  const total = activeDeck.length;

  document.getElementById('cardNum').textContent = `${pos} / ${total}`;
  document.getElementById('cardNumBack').textContent = `${pos} / ${total}`;
  document.getElementById('cardTerm').textContent = card.term;
  document.getElementById('cardMainDef').textContent = card.mainDef;

  const extraEl = document.getElementById('cardExtraDef');
  if (card.extraDef) {
    extraEl.textContent = '↳ ' + card.extraDef;
    extraEl.style.display = '';
  } else {
    extraEl.style.display = 'none';
  }

  const tipBlock = document.getElementById('cardTip');
  if (card.tip) {
    document.getElementById('cardTipText').textContent = card.tip;
    tipBlock.style.display = '';
  } else {
    tipBlock.style.display = 'none';
  }
}

function flipCard() {
  const inner = document.getElementById('cardInner');
  isFlipped = !isFlipped;
  inner.classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (activeDeck.length === 0) return;
  currentIndex = (currentIndex + 1) % activeDeck.length;
  isFlipped = false;
  renderCard();
}

function markCard(status) {
  if (activeDeck.length === 0) return;
  const card = activeDeck[currentIndex];

  if (status === 'got') {
    gotIt.add(card.term);
    stillLearning.delete(card.term);
  } else {
    stillLearning.add(card.term);
    gotIt.delete(card.term);
  }

  updateStats();
  buildActiveDeck();

  if (activeDeck.length === 0) {
    showDone();
    return;
  }
  if (currentIndex >= activeDeck.length) currentIndex = 0;
  renderCard();
}

function shuffleDeck() {
  for (let i = deck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [deck[i], deck[j]] = [deck[j], deck[i]];
  }
  buildActiveDeck();
  isFlipped = false;
  renderCard();
}

function resetAll() {
  deck = [...ALL_CARDS];
  gotIt.clear();
  stillLearning.clear();
  filter = 'all';
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === 0));
  buildActiveDeck();
  isFlipped = false;
  hideDone();
  renderCard();
  updateStats();
}

function reviewLearning() {
  filter = 'learning';
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-learning').classList.add('active');
  buildActiveDeck();
  isFlipped = false;
  hideDone();
  renderCard();
  updateStats();
}

function updateStats() {
  const remaining = ALL_CARDS.length - gotIt.size;
  document.getElementById('statRemaining').textContent = remaining;
  document.getElementById('statGot').textContent = gotIt.size;
  document.getElementById('statLearning').textContent = stillLearning.size;

  const pct = (gotIt.size / ALL_CARDS.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';

  document.getElementById('tab-learning').textContent = `Still Learning (${stillLearning.size})`;
  document.getElementById('tab-got').textContent = `Got It (${gotIt.size})`;
}

function showDone() {
  document.getElementById('mainView').style.display = 'none';
  // keep header and filter visible above
  const done = document.getElementById('doneScreen');
  done.classList.add('visible');
  document.getElementById('doneGot').textContent = gotIt.size;
  document.getElementById('doneLearning').textContent = stillLearning.size;
}

function hideDone() {
  document.getElementById('mainView').style.display = 'flex';
  document.getElementById('doneScreen').classList.remove('visible');
}

// Init
buildActiveDeck();
renderCard();
updateStats();
</script>
