<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literary Devices Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --paper: #f5f0e8;
    --card-front: #faf7f2;
    --card-back: #1e1a2e;
    --accent: #c0392b;
    --accent2: #8e44ad;
    --gold: #c9a84c;
    --got-it: #27ae60;
    --learning: #e67e22;
    --muted: #7a6f63;
    --border: #d4c9b8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
    background-image:
      radial-gradient(ellipse at 10% 0%, rgba(192,57,43,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 90% 100%, rgba(142,68,173,0.07) 0%, transparent 50%);
  }

  header {
    text-align: center;
    margin-bottom: 28px;
  }
  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.01em;
    color: var(--ink);
  }
  header h1 span { color: var(--accent); font-style: italic; }
  header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  /* Progress */
  .progress-wrap {
    width: 100%;
    max-width: 580px;
    height: 5px;
    background: var(--border);
    border-radius: 99px;
    margin-bottom: 24px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Card */
  .card-area {
    perspective: 1200px;
    width: 100%;
    max-width: 580px;
    height: 340px;
    margin-bottom: 20px;
    cursor: pointer;
  }
  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.55s cubic-bezier(0.4, 0.2, 0.2, 1);
  }
  .card-inner.flipped { transform: rotateY(180deg); }

  .card-face {
    position: absolute; inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 1px 4px rgba(0,0,0,0.06);
  }
  .card-front {
    background: var(--card-front);
    border: 1.5px solid var(--border);
  }
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 16px 16px 0 0;
  }
  .card-back {
    background: var(--card-back);
    transform: rotateY(180deg);
    color: #f0ecfa;
  }

  .card-number {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    font-weight: 500;
  }
  .card-back .card-number { color: rgba(240,236,250,0.4); }

  .term {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.8rem, 5vw, 2.6rem);
    font-weight: 700;
    color: var(--ink);
    line-height: 1.15;
  }
  .flip-hint {
    margin-top: 20px;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .def-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .main-def {
    font-size: clamp(0.88rem, 2.2vw, 1rem);
    line-height: 1.6;
    color: #f0ecfa;
    margin-bottom: 14px;
  }
  .extra-def {
    font-size: 0.78rem;
    color: rgba(240,236,250,0.55);
    line-height: 1.5;
    border-top: 1px solid rgba(255,255,255,0.1);
    padding-top: 10px;
    font-style: italic;
  }
  .tip-block {
    margin-top: 10px;
    font-size: 0.76rem;
    color: rgba(201,168,76,0.9);
    background: rgba(201,168,76,0.08);
    border-left: 2px solid var(--gold);
    padding: 7px 10px;
    border-radius: 0 6px 6px 0;
    text-align: left;
    line-height: 1.45;
  }
  .tip-block strong {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.7;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    justify-content: center;
    width: 100%;
    max-width: 580px;
  }
  .btn {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    padding: 12px 28px;
    cursor: pointer;
    transition: all 0.18s ease;
    flex: 1;
  }
  .btn:active { transform: scale(0.97); }
  .btn-got { background: var(--got-it); color: #fff; }
  .btn-got:hover { background: #219a52; }
  .btn-learning { background: var(--learning); color: #fff; }
  .btn-learning:hover { background: #ca6f1e; }

  /* End screen */
  .end-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 40px 20px;
    max-width: 480px;
    width: 100%;
  }
  .end-screen.visible { display: flex; }
  .end-emoji { font-size: 3rem; margin-bottom: 12px; }
  .end-screen h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    margin-bottom: 8px;
  }
  .end-screen p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 28px; }
  .end-stats {
    display: flex; gap: 32px; margin-bottom: 32px;
    justify-content: center;
  }
  .end-stat { text-align: center; }
  .end-stat .n {
    font-family: 'Playfair Display', serif;
    font-size: 2.2rem; font-weight: 700;
  }
  .end-stat .l { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; }
  .end-stat.green .n { color: var(--got-it); }
  .end-stat.orange .n { color: var(--learning); }
  .end-btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .btn-end {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    font-weight: 500;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .btn-end:active { transform: scale(0.97); }
  .btn-end.all { background: var(--accent2); color: #fff; }
  .btn-end.all:hover { background: #7d3c98; }
  .btn-end.sl { background: var(--learning); color: #fff; }
  .btn-end.sl:hover { background: #ca6f1e; }
  .btn-end.sl:disabled { background: var(--border); color: var(--muted); cursor: default; }

  .main-view { width: 100%; display: flex; flex-direction: column; align-items: center; }
</style>
</head>
<body>

<header>
  <h1>Literary <span>Devices</span></h1>
  <p id="headerSub">52 Terms · Tap card to flip</p>
</header>

<div class="main-view" id="mainView">
  <div class="progress-wrap">
    <div class="progress-fill" id="progressFill" style="width:0%"></div>
  </div>

  <div class="card-area" onclick="flipCard()">
    <div class="card-inner" id="cardInner">
      <div class="card-face card-front">
        <div class="card-number" id="cardNum">1 / 52</div>
        <div class="term" id="cardTerm">—</div>
        <div class="flip-hint">↻ tap to reveal</div>
      </div>
      <div class="card-face card-back">
        <div class="card-number" id="cardNumBack">1 / 52</div>
        <div class="def-label">Definition</div>
        <div class="main-def" id="cardMainDef">—</div>
        <div class="extra-def" id="cardExtraDef"></div>
        <div class="tip-block" id="cardTip" style="display:none">
          <strong>💡 Memory Tip</strong>
          <span id="cardTipText"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-learning" onclick="mark('learning')">😅 Still Learning</button>
    <button class="btn btn-got" onclick="mark('got')">✓ Got It</button>
  </div>
</div>

<div class="end-screen" id="endScreen">
  <div class="end-emoji">🎉</div>
  <h2>Round Complete!</h2>
  <p>You made it through the deck. Here's how you did:</p>
  <div class="end-stats">
    <div class="end-stat green">
      <div class="n" id="endGot">0</div>
      <div class="l">Got It</div>
    </div>
    <div class="end-stat orange">
      <div class="n" id="endLearning">0</div>
      <div class="l">Still Learning</div>
    </div>
  </div>
  <div class="end-btns">
    <button class="btn-end sl" id="btnReviewSL" onclick="reviewStillLearning()">📚 Review Still Learning</button>
    <button class="btn-end all" onclick="reviewAll()">↺ Review All</button>
  </div>
</div>

<script>
const ALL_CARDS = [
  { term:"Allegory", mainDef:"when a story has a hidden moral or political meaning", extraDef:"A narrative where characters, events, and settings represent abstract ideas or moral qualities — the whole story functions as an extended metaphor.", tip:"Think Animal Farm: the farm = the story, but the real subject is political corruption. Every element stands for something else." },
  { term:"Alliteration", mainDef:"when same sounds are repeated in closely connected words", extraDef:"Specifically the repetition of the same initial consonant sound in nearby words (e.g., 'Peter Piper picked...').", tip:"All the As in Alliteration: the SAME STARTING SOUND repeated. Think tongue twisters." },
  { term:"Allusion", mainDef:"when the writer references something outside their work to draw on our prior knowledge and associations", extraDef:"An indirect reference to a person, place, event, or other literary work — the author doesn't explain it, they trust you to recognise it.", tip:"Allusion = allude = hint. The writer alludes to (hints at) something you already know." },
  { term:"Amplification", mainDef:"when a writer embellishes a statement with further information to give multiple meanings and bring our attention to a certain concept or idea or fact", extraDef:"Taking a simple word or phrase and expanding on it with additional details to deepen its impact or layers of meaning.", tip:"Amp it up. Like turning up the volume — you take one idea and keep adding to it to make it louder and richer." },
  { term:"Anachronism", mainDef:"when an author, deliberately or accidentally, puts historical events, fashions, technology, etc., in the wrong time period", extraDef:"From Greek: 'ana' (against) + 'chronos' (time). A clock in a Shakespeare play, or a character using a smartphone in the 1800s.", tip:"Anachronism = AGAINST TIME. 'Ana-' means against, 'chron' means time (like chronology)." },
  { term:"Anagram", mainDef:"when letters from words are rearranged to create other words", extraDef:"Every letter of the original word is used exactly once in the new word. E.g., 'listen' → 'silent'; 'Voldemort' → 'Tom Marvolo Riddle'.", tip:"Think of it as a letter scramble — same letters, totally new word." },
  { term:"Analogy", mainDef:"when closely related things that may share the same pattern or relationship are compared and contrasted", extraDef:"An analogy explains something unfamiliar by comparing its relationship to something familiar (e.g., 'A sword is to a knight as a wand is to a wizard').", tip:"Analogy = relational comparison. It's not just 'these are similar' — it's 'these share the same RELATIONSHIP.' SAT-style: A:B :: C:D." },
  { term:"Anaphora", mainDef:"repetition of words or phrases at the beginnings of clauses or sentences", extraDef:"Creates rhythm and emphasis. Famous example: MLK's 'I have a dream... I have a dream... I have a dream...'", tip:"AN-aphora = AT THE FRONT. Think of 'ana' as 'again at the start.' Anaphora starts at the top." },
  { term:"Anastrophe", mainDef:"inverted word order", extraDef:"Reversing the normal order of words for rhetorical effect. Yoda speaks in anastrophe: 'Strong with the Force, you are.'", tip:"Anastrophe = Yoda-speak. Normal: 'You are strong.' Anastrophe: 'Strong, you are.' Twisted around!" },
  { term:"Anthropomorphism", mainDef:"storytelling where human characteristics are given to a non-human character, like in 'The Metamorphosis'", extraDef:"More literal than personification — the non-human character actually IS human-like in the world of the story. Personification is a figure of speech; anthropomorphism is a full narrative device.", tip:"Anthropo = human (anthropology), morph = form. Mickey Mouse walks, talks, wears clothes — he's anthropomorphic." },
  { term:"Antithesis", mainDef:"a person or thing is the direct opposite", extraDef:"More precisely: the juxtaposition of contrasting ideas in balanced, parallel structure. 'It was the best of times, it was the worst of times.' The opposition is built into the sentence's architecture.", tip:"Anti = against. Antithesis places two OPPOSITES directly against each other in a balanced structure." },
  { term:"Aphorism", mainDef:"short, memorable sayings that teach a basic truth", extraDef:"A concise statement of a principle or truth, often witty. E.g., 'The early bird catches the worm.'", tip:"Think: a fortune cookie that's actually wise. Short. True. Memorable." },
  { term:"Apostrophe", mainDef:"addressing someone or something that isn't there", extraDef:"A rhetorical device where the speaker directly addresses an absent person, a dead person, or a non-human entity as if they could respond (e.g., 'O Death, where is thy sting?').", tip:"Not the punctuation mark! 'O Romeo, Romeo, wherefore art thou Romeo?' — Juliet addresses someone not there." },
  { term:"Archetype", mainDef:"when a character is created based on a set of qualities and they represent the ideal", extraDef:"A universally recognisable character type that recurs across cultures and literature (e.g., the Hero, the Mentor, the Trickster, the Shadow).", tip:"Arche = original, type = pattern. Archetypes are the ORIGINAL templates — every hero is built on the same mould." },
  { term:"Cacophony", mainDef:"a combination of harsh, discordant sounds", extraDef:"The deliberate use of jarring, unpleasant sounds — hard consonants (k, g, b, d) — to create a sense of chaos or unease.", tip:"Caco = bad, phony = sound. Bad sound. The opposite of euphony. Think: a cat knocking everything off a shelf." },
  { term:"Chiasmus", mainDef:"when phrases or clauses are balanced against one another by being reversed", extraDef:"An A-B-B-A structure. 'Ask not what your country can do for you — ask what you can do for your country.' The second clause reverses the first.", tip:"Named after the Greek letter Chi (X) — the structure CROSSES over like an X. A→B then B→A." },
  { term:"Circumlocution", mainDef:"it is when a writer expresses things indirectly in an ambiguous or paradoxical way and doesn't want to say things directly", extraDef:"Literally 'talking around' something — using many words where fewer would do, often to avoid saying something plainly.", tip:"Circum = around (like circumference), locution = speaking. Circumlocution = talking AROUND the point. Going in circles instead of just saying it." },
  { term:"Colloquialism", mainDef:"a word or expression that is commonplace within a language or geographic area or time period to provide personality or authenticity", extraDef:"Informal, everyday language — slang, regional phrases, casual speech. 'Gonna,' 'y'all,' 'wicked good.'", tip:"Colloquial = casual conversation. Think of how you actually talk with friends vs. how you write an essay. That gap = colloquialism." },
  { term:"Connotation", mainDef:"the associative meanings or feelings that go with a word", extraDef:"The emotional or cultural baggage a word carries beyond its dictionary definition. 'Home' and 'house' have the same denotation but very different connotations.", tip:"Con = with. Connotation = what comes WITH the word. The feelings and associations attached to it." },
  { term:"Denotation", mainDef:"the literal or dictionary definition", extraDef:"The objective, dictionary meaning of a word — stripped of any emotional association. 'Snake' denotes a legless reptile.", tip:"De-notation = the basic NOTE/meaning. Plain and simple — what the dictionary says." },
  { term:"Diction", mainDef:"word choice", extraDef:"The specific vocabulary a writer selects, and how those choices shape tone, character, and meaning. Formal vs. informal, simple vs. elaborate.", tip:"Diction sounds like 'dictionary.' It's literally about which words you choose from the dictionary." },
  { term:"Double Entendre", mainDef:"when a word or phrase has two meanings (one usually a bit naughty)", extraDef:"French for 'double meaning.' One interpretation is straightforward; the other is risqué or suggestive. Shakespeare was famously full of them.", tip:"Double = two, entendre = meaning (French). Two meanings for the price of one — and one of them usually makes someone blush." },
  { term:"Dramatic Irony", mainDef:"when the audience knows something that one or more characters do not know", extraDef:"Creates tension, suspense, or dark comedy. In Romeo and Juliet, we know Juliet isn't dead — Romeo doesn't. The tragedy unfolds from that gap in knowledge.", tip:"You're watching a horror movie screaming 'DON'T GO IN THERE!' — that gap between what you know and what the character knows = dramatic irony." },
  { term:"Epistrophe", mainDef:"repetition of words or phrases at the endings of clauses or sentences", extraDef:"The mirror image of anaphora. 'Government of the people, by the people, for the people.' The repeated word comes at the END.", tip:"Opposite of anaphora. Anaphora repeats at the START, epistrophe repeats at the END." },
  { term:"Equivocation", mainDef:"Commonly known as 'doublespeak,' this is the use of vague or ambiguous language to hide one's meaning or to avoid committing to a point of view", extraDef:"Using deliberately unclear or misleading language, often to dodge accountability. Politicians are famous for it.", tip:"Equi = equal, voc = voice. Two equal voices — saying something that could mean two different things so you can't be pinned down." },
  { term:"Euphemism", mainDef:"when harsh or unpleasant words are reframed in a polite way", extraDef:"Substituting a mild or vague expression for a blunt one. 'Passed away' for 'died.' 'Downsizing' for 'firing people.'", tip:"Eu = good/pleasant (like 'euphoria'), pheme = speech. Euphemism = pleasant speech. Softening something ugly with prettier words." },
  { term:"Euphony", mainDef:"this means 'sweet voiced' and refers to sounds that are pleasing to the ear", extraDef:"The use of soft, melodious sounds — flowing vowels, gentle consonants (l, m, n, r) — to create a harmonious, musical quality.", tip:"Eu = good, phony = sound. Good sound. The opposite of cacophony. Think 'luminous,' 'melody,' 'willow' — smooth, flowing words." },
  { term:"Exposition", mainDef:"the description of background information that may cover character development, relationships, history or other relevant moments", extraDef:"The opening section of a narrative that sets the scene — who, what, where, when. The 'setup' before the action begins.", tip:"Expose = to reveal. Exposition EXPOSES the background information we need to understand the story." },
  { term:"Flashback", mainDef:"when the narrator takes us to an earlier time in the story", extraDef:"A scene set earlier in time than the main narrative — used to reveal backstory, explain motivation, or create dramatic irony. Also called 'analepsis.'", tip:"Exactly what it sounds like: a flash BACK in time. The story rewinds." },
  { term:"Foreshadowing", mainDef:"a hint of what is to come in the story", extraDef:"Clues or hints planted earlier in the narrative that anticipate later events. Creates suspense and makes the story feel inevitable in retrospect.", tip:"Fore = before (like 'forehead'). Foreshadowing casts a SHADOW of what's coming BEFORE it arrives." },
  { term:"Frame Story", mainDef:"a story set within another story", extraDef:"An outer narrative that contains or introduces one or more inner stories. E.g., The Canterbury Tales (pilgrims telling stories), or Frankenstein (letters containing a story containing a creature's story).", tip:"Like a picture frame around a painting — the frame story surrounds the inner story. One story holds another." },
  { term:"Hyperbole", mainDef:"over exaggeration for effect", extraDef:"Extreme exaggeration used for emphasis or humour — not meant to be taken literally. 'I've told you a million times.' 'I'm so hungry I could eat a horse.'", tip:"Hyper = over/excessive (hyperactive, hyperspeed). Hyperbole = WAY over the top." },
  { term:"Imagery", mainDef:"painting pictures in the readers' minds with words", extraDef:"Descriptive language that appeals to the five senses — sight, sound, smell, taste, touch — to create vivid mental pictures.", tip:"IMAGE is right inside the word. Imagery creates images in your mind." },
  { term:"Irony", mainDef:"when the actual meaning intended is actually the opposite of what is stated", extraDef:"A broad term: verbal irony = saying one thing meaning another. Situational irony = when what happens is the opposite of what was expected.", tip:"What's said ≠ what's meant. A fire station burning down = situational irony. 'Oh great, more rain' = verbal irony." },
  { term:"Juxtaposition", mainDef:"a comparison by contrast, it involves highlighting the differences between two things by placing them side by side", extraDef:"Placing two contrasting elements next to each other to highlight their differences. Unlike antithesis, juxtaposition doesn't require balanced grammatical structure.", tip:"Juxta = near/beside (like 'adjacent'). Juxtaposition = placed BESIDE each other to show contrast. Rich next to poor. Light next to dark." },
  { term:"Litotes", mainDef:"ironic understatement in which an affirmative is expressed through a negative of its contrary ('That wasn't too bad!')", extraDef:"A specific type of understatement using a negative to express a positive. 'Not bad' = good. 'Not the smartest person in the room' = pretty dumb.", tip:"Litotes is the opposite of hyperbole. Instead of over-exaggerating, you UNDER-state using a double negative." },
  { term:"Metaphor", mainDef:"a figure of speech with an implicit, implied, or hidden meaning", extraDef:"More precisely: a direct comparison between two unlike things WITHOUT 'like' or 'as.' 'Life is a journey.' The comparison is stated as fact.", tip:"No 'like' or 'as' — it just declares one thing IS another. 'You are my sunshine' — not literally true, but powerfully felt." },
  { term:"Mood", mainDef:"the way a reader feels after reading a writer's words", extraDef:"The emotional atmosphere of a text — eerie, joyful, melancholic, tense. Created through diction, imagery, setting, and tone.", tip:"Mood = how YOU (the reader) feel. Tone = how the AUTHOR feels. The author's tone creates the reader's mood." },
  { term:"Motif", mainDef:"an object or idea that repeats throughout a work that may have symbolic significance and contribute toward the main theme", extraDef:"A recurring element — image, phrase, situation — that develops or reinforces the work's themes. E.g., the green light in The Great Gatsby.", tip:"Motif rhymes with 'repeat-if.' It REPEATS throughout the work, building meaning each time it appears." },
  { term:"Onomatopoeia", mainDef:"words that imitate sounds like 'buzz' or 'crash'", extraDef:"Words whose pronunciation mimics the sound they describe. Buzz, hiss, clang, sizzle, murmur, whoosh.", tip:"Say it out loud: on-o-mat-o-POE-ia. The word sounds like what it means — words that sound like their meaning." },
  { term:"Oxymoron", mainDef:"when contradictory terms bring out a fresh meaning like 'organized chaos'", extraDef:"Two contradictory words placed together to create a new, paradoxical meaning. 'Bittersweet,' 'deafening silence,' 'cruel kindness.'", tip:"The word itself is contradictory — from Greek 'sharp dullness.' Two opposites compressed into one short phrase." },
  { term:"Paradox", mainDef:"when contradictory concepts reveal a hidden truth", extraDef:"A statement that seems self-contradictory but contains a deeper truth. 'Less is more.' 'I know that I know nothing.'", tip:"Paradox vs. Oxymoron: oxymoron is two words ('bittersweet'), paradox is a full idea ('the more you know, the more you realise you don't know')." },
  { term:"Personification", mainDef:"a figure of speech where an idea or thing is given human characteristics or feelings as if it were human", extraDef:"A type of metaphor where non-human things are given human qualities. 'The wind whispered.' 'Time flies.' Unlike anthropomorphism, this is a figure of speech, not a full narrative device.", tip:"Person-ification = making something into a PERSON (figuratively). The wind doesn't literally whisper, but giving it that human quality makes it vivid." },
  { term:"Portmanteau", mainDef:"two or more words joined together to make a new word", extraDef:"Blending parts of two words to create a new one. 'Brunch' (breakfast + lunch), 'smog' (smoke + fog), 'blog' (web + log).", tip:"A portmanteau is a suitcase with two compartments — it holds two things at once. The word CONTAINS two words packed together." },
  { term:"Puns", mainDef:"often known as a 'play on words'", extraDef:"A form of wordplay that exploits multiple meanings of a word, or similar-sounding words, for comic or rhetorical effect.", tip:"When someone makes a pun, you groan — that groan IS the pun working. 'I used to be a banker, but I lost interest.'" },
  { term:"Red Herring", mainDef:"a misleading or false clue to distract the reader, usually in mysteries or suspense", extraDef:"A narrative device that leads the reader (or a character) down a false trail, away from the real answer or culprit.", tip:"Red herrings are smelly fish dragged across a trail to throw hunting dogs off the scent. In fiction, it's a fake clue that throws YOU off the trail." },
  { term:"Rhetoric", mainDef:"the art of persuasive language", extraDef:"The study and practice of effective communication designed to inform, persuade, or motivate. Includes logos (logic), pathos (emotion), and ethos (credibility).", tip:"Think politicians, lawyers, debate champions. The art of making people believe you." },
  { term:"Satire", mainDef:"a work that makes fun of society to help us see ourselves", extraDef:"Using humour, irony, or exaggeration to criticise and expose the foolishness or vices of society, institutions, or individuals.", tip:"Satire = social mirror with a funny filter. SNL, South Park, The Daily Show — comedy with a sharp critical point underneath." },
  { term:"Simile", mainDef:"a comparison using 'like' or 'as'", extraDef:"A figure of speech that explicitly compares two unlike things using 'like' or 'as.' 'Her voice was like honey.' Easy to spot — if you see 'like' or 'as' in a comparison, it's a simile.", tip:"Simile sounds like 'similar.' It shows SIMILARITY using 'like' or 'as.' Metaphor skips the 'like/as' entirely." },
  { term:"Symbolism", mainDef:"when a writer uses one thing to represent something else", extraDef:"Using an object, person, place, or event to stand for an abstract idea or concept. The dove symbolises peace. The green light in Gatsby symbolises hope.", tip:"A symbol STANDS FOR something bigger than itself. The cross, the flag, the skull — objects that carry meaning beyond their physical form." },
  { term:"Syntax", mainDef:"word order", extraDef:"The arrangement of words and phrases to create well-formed sentences. Syntax affects rhythm, emphasis, and meaning.", tip:"Syntax vs. Diction: Diction = WHICH words. Syntax = in WHAT ORDER. Both together shape a writer's style." },
  { term:"Tone", mainDef:"the writer's attitude toward a subject", extraDef:"The feeling or attitude the author conveys through word choice and style — serious, playful, sarcastic, reverent, bitter.", tip:"Tone = author's attitude. Mood = reader's feeling. The author's TONE of voice determines the MOOD of the room." }
];

// ── State ──────────────────────────────────────────────
let deck = [];          // cards currently being studied
let currentIndex = 0;
let isFlipped = false;
let stillLearning = []; // accumulates cards marked still learning THIS round

function init(cards) {
  deck = [...cards];
  currentIndex = 0;
  isFlipped = false;
  stillLearning = [];
  document.getElementById('mainView').style.display = 'flex';
  document.getElementById('endScreen').classList.remove('visible');
  updateHeader();
  renderCard();
}

// ── Render ─────────────────────────────────────────────
function renderCard() {
  const card = deck[currentIndex];
  const total = deck.length;
  const pos = currentIndex + 1;

  document.getElementById('cardInner').classList.remove('flipped');
  isFlipped = false;

  document.getElementById('cardNum').textContent = `${pos} / ${total}`;
  document.getElementById('cardNumBack').textContent = `${pos} / ${total}`;
  document.getElementById('cardTerm').textContent = card.term;
  document.getElementById('cardMainDef').textContent = card.mainDef;

  const extraEl = document.getElementById('cardExtraDef');
  extraEl.textContent = card.extraDef ? '↳ ' + card.extraDef : '';
  extraEl.style.display = card.extraDef ? '' : 'none';

  const tipBlock = document.getElementById('cardTip');
  if (card.tip) {
    document.getElementById('cardTipText').textContent = card.tip;
    tipBlock.style.display = '';
  } else {
    tipBlock.style.display = 'none';
  }

  // progress = how far through this deck
  document.getElementById('progressFill').style.width = ((pos - 1) / total * 100) + '%';
}

function updateHeader() {
  document.getElementById('headerSub').textContent = deck.length + ' Terms · Tap card to flip';
}

// ── Flip ───────────────────────────────────────────────
function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('cardInner').classList.toggle('flipped', isFlipped);
}

// ── Mark ───────────────────────────────────────────────
function mark(status) {
  const card = deck[currentIndex];

  if (status === 'learning') {
    // add to still-learning list if not already there
    if (!stillLearning.find(c => c.term === card.term)) {
      stillLearning.push(card);
    }
  }

  const isLast = currentIndex === deck.length - 1;

  if (isLast) {
    showEnd();
  } else {
    currentIndex++;
    isFlipped = false;
    renderCard();
  }
}

// ── End screen ─────────────────────────────────────────
function showEnd() {
  document.getElementById('mainView').style.display = 'none';
  const end = document.getElementById('endScreen');
  end.classList.add('visible');

  const gotCount = deck.length - stillLearning.length;
  document.getElementById('endGot').textContent = gotCount;
  document.getElementById('endLearning').textContent = stillLearning.length;

  const slBtn = document.getElementById('btnReviewSL');
  if (stillLearning.length === 0) {
    slBtn.disabled = true;
    slBtn.textContent = '📚 Review Still Learning (none!)';
  } else {
    slBtn.disabled = false;
    slBtn.textContent = '📚 Review Still Learning (' + stillLearning.length + ')';
  }
}

function reviewAll() {
  init(ALL_CARDS);
}

function reviewStillLearning() {
  if (stillLearning.length === 0) return;
  init(stillLearning);
}

// ── Boot ───────────────────────────────────────────────
init(ALL_CARDS);
</script>
